<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Manipulation</title>
    <style>
        .Heading {
            color: rgb(0, 0, 0);
            background-color: rgb(180, 40, 40);
            font-size: 20px;
        }
        .light {
            color: rgb(0, 0, 0);
            background-color: rgb(5, 196, 235);
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>DOM Manipulation Example</h1>
    <h2> DOM heading 2</h2>
    
    <div class="box">
        <p>This is a highlighted paragraph.</p>
    </div>  
    
    <a href="#" id="myLink">Visit Example.com</a>
    <img src="example.jpg" alt="Example Image" id="myImage">
    
    <div id="myElement" class="myClass" data-attribute="value">
        Hello, DOM!     
    </div>  

    <!-- Linking the JavaScript file -->
    <script src="./dom.js"></script>
</body>
</html>
