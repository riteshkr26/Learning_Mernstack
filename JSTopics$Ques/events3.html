<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Card Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        input, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        button {
            background-color: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #0056b3;
        }
        #main {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }
        /* Styles for the dynamically created cards */
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            width: 250px;
            padding: 15px;
            text-align: center;
        }
        .profile {
            margin-top: 10px;
        }
        .profile img {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin-bottom: 10px;
        }
        .profile h3 {
            margin: 5px 0;
            color: #333;
        }
        .profile p {
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <form id="userForm">
        <h3>Enter User Details</h3>
        <input type="text" placeholder="Enter Full Name" required>
        <input type="text" placeholder="Enter Role (e.g., Developer)" required>
        <input type="text" placeholder="Paste Profile Image URL" required>
        <button type="submit">Create Card</button>
    </form>

    <div id="main"></div>

    <script src="./events3.js"></script>
</body>
</html>
