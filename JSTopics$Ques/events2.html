<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        #main {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            background-color: rgb(189, 255, 82);
        }

        h1 {
            color: black;
            font-size: 10rem;
            font-weight: 300;
            user-select: none;
        }

        input {
            display: none;
        }

        #btn {
            background-color: rgb(130, 237, 237);
            color: aliceblue;
            font-weight: 300;
            padding: 20px 12px;
            border-radius: 6px;
            user-select: none;
        }
        #btn:hover{
            background-color: rgb(2, 244, 244);
        }
    </style>
</head>

<body>

    <div id="main">
        <!-- <h1>k</h1> -->
        <input type="file" id="inptype">
        <div id="btn"> Upload File </div>
    </div>

</body>
