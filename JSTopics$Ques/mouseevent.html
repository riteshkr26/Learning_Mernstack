<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Tracker Box</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background-color: #111;
            overflow: hidden; /* Prevents scrollbars as the box moves */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Instruction text in the background */
        .instructions {
            color: #555;
            font-family: sans-serif;
            font-size: 24px;
            user-select: none;
        }
        /* The moving container box */
        #movingBox {
            width: 100px;
            height: 100px;
            background-color: crimson;
            border-radius: 12px;
            position: fixed; /* Crucial for absolute movement via top/left */
            pointer-events: auto; /* Keeps hover states active */
            cursor: grab;
            transition: background-color 0.3s ease; /* Smooth color change */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: sans-serif;
            color: white;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            
            /* Shifts the element so the cursor sits perfectly in the center of the box */
            transform: translate(-50%, -50%); 
        }
    </style>
</head>
<body>

    <div class="instructions">Move your mouse around the screen</div>

    <div id="movingBox">Hover Me</div>

    <script src="./mousevent.js"></script>
</body>
</html>
