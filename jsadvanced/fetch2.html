<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetch API & HTTP Basics</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111827; 
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
        }
        .container {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .card {
            background-color: #1f2937;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            width: 220px;
        }
        .card img {
            border-radius: 50%;
            border: 3px solid #3b82f6;
            width: 80px;
            height: 80px;
            object-cover: cover;
            margin-bottom: 10px;
        }
        .button-group {
            display: flex;
            gap: 12px;
        }
        button {
            padding: 12px 24px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div id="userContainer" class="container"></div>

    <div class="button-group">
        <button id="fetchBtn">Fetch New User (GET)</button>
        <button id="sendBtn" style="background-color: #10b981;">Submit Form Data (POST)</button>
    </div>

    <script src="fetch2.js"></script>
</body>
</html>
